<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-semibold text-center text-gray-700 mb-6">ログイン</h2>

        <!-- エラーメッセージ -->
        <p th:if="${errorMessage}" th:text="${errorMessage}"
           class="text-center p-3 mb-4 rounded-lg text-white bg-red-500"></p>

        <!-- ログアウト通知 -->
        <p th:if="${logoutMessage}" th:text="${logoutMessage}"
           class="text-center p-3 mb-4 rounded-lg text-white bg-gray-500"></p>

        <!-- 登録成功通知 -->
        <p th:if="${param.registered}"
           class="text-center p-3 mb-4 rounded-lg text-white bg-green-500">
            登録完了！ログインしてください
        </p>

        <!-- ログインフォーム -->
        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-gray-600">Email:</label>
                <input type="email" name="email" required
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>
            <div>
                <label class="block text-gray-600">Password:</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>
            <button type="submit"
                    class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition duration-300">
                ログイン
            </button>
        </form>

        <p class="mt-4 text-gray-600 text-center">
            アカウントがない場合は
            <a href="/register" class="text-blue-500 hover:underline">登録</a>
            してください。
        </p>
    </div>

</body>
</html>
