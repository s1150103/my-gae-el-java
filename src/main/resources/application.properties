server.port=8080
spring.application.name=my-gae-el

# PostgreSQL データソース設定
# ローカル開発時は環境変数または直接記述
spring.datasource.url=jdbc:postgresql://localhost:5432/mygaeel
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate 設定
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# GAE Cloud SQL（本番環境）
# UNIX ソケット経由で接続する場合は以下を使用
# spring.datasource.url=jdbc:postgresql:///mygaeel?cloudSqlInstance=PROJECT:REGION:INSTANCE&socketFactory=com.google.cloud.sql.postgres.SocketFactory
