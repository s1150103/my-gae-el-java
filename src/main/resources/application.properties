server.port=8080
spring.application.name=my-gae-el

# ============================================================
# データベース接続設定
# ============================================================
#
# 【Cloud Run 本番環境】
#   Cloud Run の環境変数に以下を設定:
#
#   DB_URL      = jdbc:postgresql:///postgres?
#                   cloudSqlInstance=PROJECT_ID:REGION:INSTANCE_NAME
#                   &socketFactory=com.google.cloud.sql.postgres.SocketFactory
#   DB_USER     = Cloud SQL ユーザー名
#   DB_PASSWORD = Cloud SQL パスワード（Secret Manager 推奨）
#
# 【ローカル開発 (Cloud SQL Auth Proxy 使用)】
#   $ cloud-sql-proxy PROJECT_ID:REGION:INSTANCE_NAME  # 別ターミナルで起動
#   DB_URL      = jdbc:postgresql://127.0.0.1:5432/postgres
#   DB_USER     = postgres
#   DB_PASSWORD = パスワード
#
# ============================================================

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate 設定
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# 接続プール設定（HikariCP）
# Cloud Run はリクエスト処理型なのでプールは小さめに設定
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
