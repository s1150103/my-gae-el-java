server.port=8080
spring.application.name=my-gae-el

# ============================================================
# Supabase PostgreSQL 接続設定
# ============================================================
# Supabase ダッシュボード → Project Settings → Database から取得
#
# 【接続先の選び方】
#   直接接続 (port 5432) : ローカル開発・バッチ処理向け
#   接続プーラー (port 6543): 本番・サーバーレス環境向け（推奨）
#
# 直接接続 URL 例:
#   jdbc:postgresql://db.xxxxxxxxxxxx.supabase.co:5432/postgres?sslmode=require
#
# 接続プーラー URL 例:
#   jdbc:postgresql://aws-0-ap-northeast-1.pooler.supabase.com:6543/postgres?sslmode=require
# ============================================================

spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://db.xxxxxxxxxxxx.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:your-password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate 設定
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# 接続プール設定（HikariCP）
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
